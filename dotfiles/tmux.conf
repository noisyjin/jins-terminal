# ============================================
# iTerm2 + tmux 集成配置
# ============================================

# --- 基础设置 ---

# 使用 256 色 + true color 支持
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

# 让 tmux 使用你的默认 shell (zsh)
set -g default-shell /bin/zsh

# 从 1 开始编号（0 太远了，按起来不方便）
set -g base-index 1
setw -g pane-base-index 1

# 窗口关闭后自动重新编号
set -g renumber-windows on

# 增大滚动历史（默认 2000 太少）
set -g history-limit 50000

# 减少 ESC 延迟（对 vim 用户很重要，否则按 ESC 会有明显卡顿）
set -g escape-time 10

# 开启鼠标支持（可以用鼠标点击切换面板、拖拽调整大小、滚动）
set -g mouse on

# 自动刷新 status bar 的间隔（秒）
set -g status-interval 5

# 当其他窗口有活动时高亮提示
setw -g monitor-activity on
set -g visual-activity off

# --- 快捷键设置 ---

# 把前缀键从 Ctrl-B 改成 Ctrl-A（更顺手，跟 screen 一致）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 用 | 和 - 来分屏（比默认的 % 和 " 直观得多）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新建窗口时保持当前目录
bind c new-window -c "#{pane_current_path}"

# 用 vim 风格的 hjkl 切换面板
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 用 Alt+方向键 快速切换面板（不需要前缀键）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 用 Shift+方向键 切换窗口（不需要前缀键）
bind -n S-Left previous-window
bind -n S-Right next-window

# 按 r 重新加载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- 外观设置（Catppuccin Mocha 配色）---

# 状态栏位置
set -g status-position bottom

# 状态栏颜色
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 当前窗口高亮
setw -g window-status-current-style "bg=#45475a,fg=#89b4fa,bold"

# 状态栏内容
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S "
set -g status-right "#[fg=#a6adc8] %Y-%m-%d %H:%M "
set -g status-left-length 30

# 面板分割线颜色
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# --- iTerm2 集成优化 ---

# 开启焦点事件（让 vim 等程序知道终端是否获得焦点）
set -g focus-events on

# 允许程序设置剪贴板（与 macOS 剪贴板同步）
set -s set-clipboard on
